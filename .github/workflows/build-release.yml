name: Build and Release modbusctl
run-name: Build and Release of modbusctl on '${{ github.ref_name }}' with bump '${{ inputs.bump }}'

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump strategy (none, patch, minor, major)"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  IMAGE_NAME: modbusctl
  DOCKERHUB_USER: boeboe

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat version.txt)
          IFS='.' read -r major minor patch <<< "$VERSION"
          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
            none)
              ;;
          esac
          NEW_VERSION="$major.$minor.$patch"
          echo "$NEW_VERSION" > version.txt
          git add version.txt
          if [[ "${{ inputs.bump }}" != "none" ]]; then
            git commit -m "Bump version to $NEW_VERSION"
            git push origin HEAD
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Show calculated version that will be built
        run: |
          echo "🔖 Final version to build: $(cat version.txt)"

  build-native:
    name: Build Native Binaries
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Cache Go modules explicitly
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/go/pkg/mod
            ${{ github.workspace }}/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Configure Go environment
        run: |
          echo "GOMODCACHE=${{ github.workspace }}/go/pkg/mod" >> $GITHUB_ENV
          echo "GOCACHE=${{ github.workspace }}/go-build" >> $GITHUB_ENV

      - name: Build and package using Makefile
        env:
          VERSION: ${{ needs.bump-version.outputs.version }}
        run: |
          echo "${{ env.VERSION }}" > version.txt
          make release-all

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: modbusctl-${{ needs.bump-version.outputs.version }}
          path: release/*.tar.gz

  create-github-release:
    name: Create GitHub Release
    needs:
      - bump-version 
      - build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: modbusctl-${{ needs.bump-version.outputs.version }}
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          name: v${{ needs.bump-version.outputs.version }}
          draft: false
          prerelease: false
          files: artifacts/*.tar.gz

  build-docker-amd64:
    name: Build Docker Image (AMD64)
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bump-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            RELEASE_VERSION=${{ env.VERSION }}
            GIT_COMMIT_HASH=${{ github.sha }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest-amd64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

  build-docker-arm64:
    name: Build Docker Image (ARM64)
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bump-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            RELEASE_VERSION=${{ env.VERSION }}
            GIT_COMMIT_HASH=${{ github.sha }}
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest-arm64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  push-docker-manifest:
    name: Push Docker Manifest
    needs:
      - bump-version
      - build-docker-amd64
      - build-docker-arm64
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.bump-version.outputs.version }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push Docker manifest
        run: |
          BASE_IMAGE="${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}"
          docker manifest create "${BASE_IMAGE}:${VERSION}" \
            "${BASE_IMAGE}:${VERSION}-amd64" \
            "${BASE_IMAGE}:${VERSION}-arm64"
          docker manifest push "${BASE_IMAGE}:${VERSION}"
          docker manifest create "${BASE_IMAGE}:latest" \
            "${BASE_IMAGE}:latest-amd64" \
            "${BASE_IMAGE}:latest-arm64"
          docker manifest push "${BASE_IMAGE}:latest"