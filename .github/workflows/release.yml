name: Release

run-name: Release (${{ inputs.bump }}) from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release-modbusctl-binary:
    uses: otfabric/.github/.github/workflows/go-binary-release.yml@v2
    with:
      bump: ${{ inputs.bump }}
      binary-name: modbusctl
      main-path: ./
      ldflags: "-s -w -X main.version=${VERSION} -X main.tag=${TAG} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}"
      run-tests: true
    secrets: inherit
